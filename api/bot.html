<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Проверка /start</title>
</head>
<body>
  <h2>Проверка Telegram на команду /start</h2>
  <p>Статус: <span id="status">Ожидание...</span></p>

  <script>
    const token = '8112715154:AAG8UTvBi79BvqBB4Cqob95oYgJxbXpgjiY';
    const apiUrl = `https://api.telegram.org/bot${token}/getUpdates`;
    let lastUpdateId = 0;

    async function checkTelegramStart() {
      try {
        const res = await fetch(`${apiUrl}?offset=${lastUpdateId + 1}`);
        const data = await res.json();

        if (data.ok && data.result.length > 0) {
          for (const update of data.result) {
            lastUpdateId = update.update_id;
            const message = update.message;

            if (message && message.text === '/start') {
              document.getElementById('status').textContent = `Обнаружен /start от @${message.from.username || 'пользователя'} (ID: ${message.from.id})`;
            }
          }
        }
      } catch (err) {
        document.getElementById('status').textContent = 'Ошибка запроса';
        console.error(err);
      }
    }

    setInterval(checkTelegramStart, 5000);
  </script>
</body>
</html>
