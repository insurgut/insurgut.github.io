<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>insurgut.github.io</title>
  <link href="https://fonts.cdnfonts.com/css/mona-sans" rel="stylesheet">
  <style>
    @import url("https://fonts.cdnfonts.com/css/mona-sans");

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: #1e1e1e;
      font-family: "Mona-Sans", sans-serif;
      font-size: 14px;
      font-weight: 400;
    }

    .container {
      --sz: min(90vh, clamp(360px, 60vw, 500px));
      --fz: calc(0.032 * var(--sz));
      --xv: 0;
      --yv: 0;
      width: var(--sz);
      height: calc(1.05 * var(--sz));
      max-width: calc(100vw - 24px);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      transform-style: preserve-3d;
      perspective: 1200px;
    }

    .container .tilt {
      width: 86%;
      height: 86%;
      border: 1px solid #9b6b51aa;
      border-radius: 22px;
      transition: all 0.4s ease-out;
      box-shadow: 0 0 0 10000px #1e1e1e;
      transform: rotateX(calc(1deg * var(--xv))) rotateY(calc(1deg * var(--yv)));
      background: linear-gradient(calc(var(--yv) * -0.4deg),
          transparent,
          transparent calc(20% + (-3px * var(--xv))),
          rgba(255, 255, 255, 0.06) calc(40% + (-3px * var(--xv))),
          rgba(255, 255, 255, 0.02) calc(70% + (-3px * var(--xv))),
          transparent calc(90% + (-3px * var(--xv))),
          transparent);
      padding: 12px 22px;
    }

    .container .tilt::before {
      content: "";
      display: block;
      position: absolute;
      left: -12px;
      top: -12px;
      margin: auto;
      width: calc(100% + 24px);
      height: calc(100% + 24px);
      border: 1px solid #9b6b5155;
      border-radius: 28px;
    }

    .tag {
      display: block;
      width: fit-content;
      border: 1px solid #fff3;
      border-radius: 4px;
      color: #fff;
      font-size: 0.8em;
      font-size: calc(0.8 * var(--fz));
      margin: 0 auto 22px auto;
      padding: 4px 8px;
    }

    h2 {
      font-size: 3.6em;
      font-size: calc(3.6 * var(--fz));
      font-weight: 800;
      line-height: 116%;
      background: linear-gradient(0deg, #fff8 0%, #fffd 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin: 0;
    }

    p {
      font-size: 1.3em;
      font-size: calc(1.3 * var(--fz));
      font-weight: 600;
      line-height: 142%;
      color: #fff8;
      text-align: center;
    }

    p span {
      color: #fffc;
    }

    .vortex svg {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6%;
      width: 88%;
      margin: auto;
      opacity: 0.1;
    }

    .mist {
      position: absolute;
      width: 140%;
      height: 200%;
      bottom: -6%;
      left: -20%;
      box-shadow: inset 0 0 calc(var(--sz) / 6) calc(var(--sz) / 10) #c13f1f;
      border-radius: calc(var(--sz) / 2);
    }

    .orbs {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .orbs .hide-orb {
      --ax: calc((3 / 3.6) * var(--sz));
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: 100%;
      border-radius: calc((1 / 3) * var(--sz));
      box-shadow: inset 0 calc((0.78) * var(--sz)) calc((0.08) * var(--sz)) calc((-0.18) * var(--sz)) #1e1e1e;
    }

    .orbs .orb {
      position: absolute;
      width: calc(var(--sz) / 6);
      height: calc(var(--sz) / 6);
      background: #fe1e20;
      box-shadow: 0 -2px 12px -3px #fe1e20, inset 8px -4px 2px 0 #fff2,
        inset 0 0 12px 0 #fffc, inset 0 6px 12px -6px #0008,
        inset 0 32px 12px -12px #0003;
      border-radius: 100%;
      left: 0;
      right: 0;
      margin: auto;
      bottom: 20%;
      opacity: 0;
      --startX: calc(-0.6 * var(--sz));
      --startY: 0;
      --offset: 0s;
      animation: orbX 24s cubic-bezier(0.11, 0, 0.5, 0) infinite,
        orbY 24s cubic-bezier(0.64, 0, 0.92, 0) infinite;
      animation-delay: var(--offset);
    }

    .orbs .orb:nth-child(2) {
      --startX: calc(0.6 * var(--sz));
      --offset: 4s;
    }

    .orbs .orb:nth-child(3) {
      --startX: calc(-0.3 * var(--sz));
      --startY: calc(-0.3 * var(--sz));
      --offset: 8s;
    }

    .orbs .orb:nth-child(4) {
      --startX: calc(0.3 * var(--sz));
      --startY: calc(-0.3 * var(--sz));
      --offset: 12s;
    }

    .orbs .orb:nth-child(5) {
      --startX: calc(-0.6 * var(--sz));
      --startY: calc(-0.15 * var(--sz));
      --offset: 16s;
    }

    .orbs .orb:nth-child(6) {
      --startX: calc(0.6 * var(--sz));
      --startY: calc(-0.15 * var(--sz));
      --offset: 20s;
    }

    .orbs .orb img {
      width: 64%;
      height: auto;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
    }

    .repo-menu {
      display: none;
      position: absolute;
      background: rgba(30, 30, 30, 0.98);
      border: 1px solid #9b6b51;
      border-radius: 22px;
      padding: 20px;
      overflow-y: auto;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      color: white;
    }

    .menu-content h3 {
      color: white;
      margin: 0 0 15px 0;
      font-size: 1.2em;
      text-align: center;
    }

    .repo-link {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .repo-link:hover {
      background: rgba(155, 107, 81, 0.3);
    }

    .repo-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .repo-desc {
      font-size: 0.9em;
      color: #fff8;
    }

    .menu-hitbox {
      position: absolute;
      z-index: 999;
      opacity: 0;
    }


    @keyframes innerDot {
      to {
        rotate: 360deg;
      }
    }

    @keyframes innerDot2 {
      50% {
        translate: 0 -16px;
      }
      100% {
        translate: 0 0px;
      }
    }

    @keyframes orbX {
      0% {
        translate: var(--startX) var(--startY);
      }
      20% {
        translate: 0 0;
      }
      100% {
        translate: 0 0;
      }
    }

    @keyframes orbY {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      20% {
        transform: translateY(calc(0.3 * var(--sz))) scale(0.5);
        opacity: 0;
      }
      100% {
        transform: translateY(calc(0.3 * var(--sz))) scale(0.5);
        opacity: 0;
      }
    }
  </style>
</head>

  <script>
    async function fetchGitHubRepos() {
      try {
        const response = await fetch('https://api.github.com/users/insurgut/repos');
        const repos = await response.json();
        return repos;
      } catch (error) {
        console.error('Error fetching repos:', error);
        return [];
      }
    }

    async function createRepoMenu() {
      try {
        const repos = await fetchGitHubRepos();
        const repoCount = repos.length;
        console.log('Fetched repos:', repoCount);

        const repoCountSpan = document.querySelector('.repo-count');
        const menu = document.querySelector('.repo-menu');
        const tilt = document.querySelector('.tilt');

        // Create repo word span
        const repoWordSpan = document.createElement('span');
        repoWordSpan.textContent = 'repositories';
        repoWordSpan.style.color = '#9b6b51';
        repoWordSpan.style.cursor = 'pointer';
        repoWordSpan.style.textDecoration = 'underline';

        // Set repo count text
        repoCountSpan.textContent = repoCount + ' ';
        repoCountSpan.appendChild(repoWordSpan);

        // Update menu content
        const repoList = repos.map(repo => `
          <a href="${repo.html_url}" target="_blank" class="repo-link">
            <div class="repo-name">${repo.name}</div>
            <div class="repo-desc">${repo.description || ''}</div>
          </a>
        `).join('');

        menu.innerHTML = `
          <div class="menu-content">
            <h3>My Repositories</h3>
            ${repoList}
          </div>
        `;

        // Menu functions
        function showMenu() {
          menu.style.display = 'block';
        }

        function hideMenu() {
          menu.style.display = 'none';
        }

        // Event listeners for desktop
        if (window.matchMedia('(min-width: 768px)').matches) {
          const countHitbox = document.createElement('div');
          const wordHitbox = document.createElement('div');

          [countHitbox, wordHitbox].forEach(hitbox => {
            hitbox.className = 'menu-hitbox';
            hitbox.style.cssText = `
              position: absolute;
              z-index: 999;
              opacity: 0;
            `;
          });

          function updateHitboxes() {
            const countRect = repoCountSpan.getBoundingClientRect();
            const wordRect = repoWordSpan.getBoundingClientRect();
            const tiltRect = tilt.getBoundingClientRect();

            countHitbox.style.top = (countRect.top - tiltRect.top - 2.5) + 'px';
            countHitbox.style.left = (countRect.left - tiltRect.left - 2.5) + 'px';
            countHitbox.style.width = (repoCount.toString().length * 10 + 5) + 'px';
            countHitbox.style.height = (countRect.height + 5) + 'px';

            wordHitbox.style.top = (wordRect.top - tiltRect.top - 2.5) + 'px';
            wordHitbox.style.left = (wordRect.left - tiltRect.left - 2.5) + 'px';
            wordHitbox.style.width = (wordRect.width + 5) + 'px';
            wordHitbox.style.height = (wordRect.height + 5) + 'px';
          }

          tilt.appendChild(countHitbox);
          tilt.appendChild(wordHitbox);
          updateHitboxes();
          window.addEventListener('resize', updateHitboxes);

          [countHitbox, wordHitbox].forEach(hitbox => {
            hitbox.addEventListener('mouseenter', showMenu);
            hitbox.addEventListener('mouseleave', (e) => {
              if (!menu.matches(':hover')) {
                hideMenu();
              }
            });
          });

          menu.addEventListener('mouseenter', () => {
            menu.style.display = 'block';
          });

          menu.addEventListener('mouseleave', hideMenu);
        } else {
          repoCountSpan.addEventListener('click', () => {
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
          });
        }
      } catch (error) {
        console.error('Error in createRepoMenu:', error);
      }
    }

    // Tilt effect
    const ct = document.querySelector(".container");
    let animationFrame;
    let easingActive = false;
    const easeOutQuad = (t) => t * (2 - t);

    const animateEasing = (startX, startY, endX, endY, duration) => {
      const startTime = performance.now();
      const animate = (time) => {
        const progress = Math.min((time - startTime) / duration, 1);
        const easedProgress = easeOutQuad(progress);
        const currentX = startX + (endX - startX) * easedProgress;
        const currentY = startY + (endY - startY) * easedProgress;
        ct.style.setProperty("--xv", currentX);
        ct.style.setProperty("--yv", currentY);
        if (progress < 1) {
          animationFrame = requestAnimationFrame(animate);
        } else {
          easingActive = false;
        }
      };
      easingActive = true;
      cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(animate);
    };

    ct.addEventListener("mousemove", function (e) {
      if (easingActive) return;
      const rect = ct.getBoundingClientRect();
      const se = 42;
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const rotateX = (y / rect.height - 0.5) * se;
      const rotateY = (x / rect.width - 0.5) * se;
      const currentX = parseFloat(getComputedStyle(ct).getPropertyValue("--xv")) || 0;
      const currentY = parseFloat(getComputedStyle(ct).getPropertyValue("--yv")) || 0;
      animateEasing(currentX, currentY, rotateX, rotateY, 100);
    });

    ct.addEventListener("mouseleave", () => {
      const currentX = parseFloat(getComputedStyle(ct).getPropertyValue("--xv")) || 0;
      const currentY = parseFloat(getComputedStyle(ct).getPropertyValue("--yv")) || 0;
      animateEasing(currentX, currentY, 0, 0, 200);
    });

    // Initialize when DOM is loaded
    document.addEventListener('DOMContentLoaded', createRepoMenu);
  </script>
