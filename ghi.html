<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Перемещение блоков на сетке</title>
<style>
  :root {
    --tg-bg-color: #ffffff;
    --tg-grid-line-color: #e0e0e0; /* чуть темнее фона */
  }

  body, html {
    margin: 0; padding: 0; height: 100%;
    background-color: var(--tg-bg-color);
    background-image:
      linear-gradient(to right, var(--tg-grid-line-color) 1px, transparent 1px),
      linear-gradient(to bottom, var(--tg-grid-line-color) 1px, transparent 1px);
    background-size: 5px 5px;
    user-select: none;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .draggable {
    position: absolute;
    width: 120px;
    height: 80px;
    background: #0088cccc;
    border: 2px solid #005577;
    border-radius: 8px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: box-shadow 0.2s;
  }
  .draggable:active {
    cursor: grabbing;
    box-shadow: 0 8px 12px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<div class="draggable" style="top: 40px; left: 40px;">Блок 1</div>
<div class="draggable" style="top: 120px; left: 200px;">Блок 2</div>
<div class="draggable" style="top: 220px; left: 100px;">Блок 3</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();

    function applyTheme() {
      const root = document.documentElement;
      root.style.setProperty('--tg-bg-color', tg.themeParams.bg_color || '#ffffff');

      // вычислим цвет линии немного темнее фона
      // простой вариант: если фон светлый — делаем #e0e0e0, если темный — #2a2a2a
      const bg = tg.themeParams.bg_color || '#ffffff';

      function isColorLight(color) {
        // простая проверка яркости цвета в hex (#rrggbb)
        const r = parseInt(color.substr(1,2),16);
        const g = parseInt(color.substr(3,2),16);
        const b = parseInt(color.substr(5,2),16);
        // формула яркости
        return (r*0.299 + g*0.587 + b*0.114) > 186;
      }

      const lineColor = isColorLight(bg) ? '#e0e0e0' : '#2a2a2a';
      root.style.setProperty('--tg-grid-line-color', lineColor);
    }

    applyTheme();
    tg.onEvent('themeChanged', applyTheme);
  }

  // Далее — твой код drag'n'drop
  const draggables = document.querySelectorAll('.draggable');

  draggables.forEach(block => {
    let offsetX, offsetY;
    let isDragging = false;

    block.addEventListener('mousedown', e => {
      isDragging = true;
      offsetX = e.clientX - block.getBoundingClientRect().left;
      offsetY = e.clientY - block.getBoundingClientRect().top;
      block.style.zIndex = 1000;
      block.style.transition = 'none';
    });

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      let x = e.clientX - offsetX;
      let y = e.clientY - offsetY;

      const minX = 0;
      const minY = 0;
      const maxX = window.innerWidth - block.offsetWidth;
      const maxY = window.innerHeight - block.offsetHeight;

      if (x < minX) x = minX;
      if (y < minY) y = minY;
      if (x > maxX) x = maxX;
      if (y > maxY) y = maxY;

      block.style.left = x + 'px';
      block.style.top = y + 'px';
    });

    document.addEventListener('mouseup', e => {
      if (isDragging) {
        isDragging = false;
        block.style.zIndex = '';
        block.style.transition = '';
      }
    });

    block.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.touches[0];
      isDragging = true;
      offsetX = touch.clientX - block.getBoundingClientRect().left;
      offsetY = touch.clientY - block.getBoundingClientRect().top;
      block.style.zIndex = 1000;
      block.style.transition = 'none';
    });

    document.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const touch = e.touches[0];
      let x = touch.clientX - offsetX;
      let y = touch.clientY - offsetY;

      const minX = 0;
      const minY = 0;
      const maxX = window.innerWidth - block.offsetWidth;
      const maxY = window.innerHeight - block.offsetHeight;

      if (x < minX) x = minX;
      if (y < minY) y = minY;
      if (x > maxX) x = maxX;
      if (y > maxY) y = maxY;

      block.style.left = x + 'px';
      block.style.top = y + 'px';
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (isDragging) {
        isDragging = false;
        block.style.zIndex = '';
        block.style.transition = '';
      }
    });
  });
</script>

</body>
</html>
